  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="shell">
      <header class="brand">
        <div class="brand-copy">
          <p class="brand-eyebrow">uuid.airat.top</p>
          <h1>UUID v4 / v7 Generator</h1>
          <p class="brand-subtitle">
            Offline-friendly. Instant copy. Zero history. Open-source. Privacy-first.
            Generate UUID v4 or UUID v7: one value or up to 10,000 in one click.
          </p>
        </div>
        <div class="brand-actions">
          <button class="repo-link reset-button" id="resetDefaults" type="button">Reset defaults</button>
          <a class="repo-link" href="https://github.com/AiratTop/uuid.airat.top" target="_blank" rel="noreferrer">
            GitHub
          </a>
        </div>
      </header>

      <section class="panel is-active" id="panel-uuid" role="region" aria-label="UUID generator">
        <div class="output" id="uuidOutputWrap">
          <div class="output-value output-value--uuid is-single" id="uuidOutput" aria-live="polite"></div>
        </div>
        <div class="action-row action-row--uuid">
          <button class="action-button primary" type="button" id="uuidCopy">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                />
              </svg>
            </span>
            Copy UUIDs
          </button>
          <button class="action-button secondary" type="button" id="uuidRefresh">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M20 12a8 8 0 0 1-14.31 4.9l-1.69 1.69V14h4.6l-1.61 1.61A6 6 0 1 0 12 6c-1.24 0-2.41.38-3.39 1.03L7.16 5.58A7.94 7.94 0 0 1 12 4a8 8 0 0 1 8 8Z"
                />
              </svg>
            </span>
            Regenerate UUIDs
          </button>
          <button class="action-button secondary" type="button" id="uuidDownload">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M11 3h2v9.17l2.59-2.58L17 11l-5 5-5-5 1.41-1.41L11 12.17V3Zm-7 15h16v3H4v-3Z"
                />
              </svg>
            </span>
            Download .txt
          </button>
        </div>
        <p class="status" id="uuidStatus" role="status"></p>
        <div class="settings-strip" aria-label="Generator settings">
          <label class="field field--center">
            <span>Version</span>
            <div class="version-switch" role="group" aria-label="UUID version">
              <button
                class="version-button is-active"
                type="button"
                data-uuid-version="4"
                aria-pressed="true"
              >
                v4
              </button>
              <button class="version-button" type="button" data-uuid-version="7" aria-pressed="false">
                v7
              </button>
            </div>
            <small>v4 is random. v7 includes Unix timestamp for sortable IDs.</small>
          </label>
          <label class="field field--center uuid-count-field">
            <span>Count (1-10,000)</span>
            <input type="number" id="uuidCount" min="1" max="10000" value="1" />
            <small>Generates one UUID per line for quick paste into tables.</small>
          </label>
        </div>
      </section>
